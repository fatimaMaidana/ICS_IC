name: CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm test
      - run: npm run lint

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/contador-visitas:latest

      - name: Notify Discord
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MSG="Pipeline ejecutado correctamente"
          else
            MSG="El pipeline falló"
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"$MSG\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}
